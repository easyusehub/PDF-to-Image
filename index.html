<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF to Image – EasyUseHub</title>
<meta name="description" content="Convert PDF pages to PNG images online. Free browser-based PDF to Image tool by EasyUseHub. Fast, secure, up to 15 MB.">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background:#1a1a1a;
  color:#fff;
  margin:0;
  padding:0;
  text-align:center;
}
.container{
  max-width:900px;
  margin:40px auto;
  padding:40px 25px;
  background:#222;
  border-radius:12px;
  box-shadow:0 4px 25px rgba(0,0,0,0.7);
}
h1{font-size:32px; margin-bottom:15px; color:#fff;}
p{color:#dcdcdc; font-size:16px; line-height:1.6; margin-bottom:30px;}

/* PDF file upload & convert button */
input[type=file]{padding:12px; font-size:16px; margin:15px 0; border-radius:6px;}
button{
  padding:12px 28px;
  background:#ef4444;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
  margin:10px 0;
  transition:0.3s;
}
button:disabled{background:#555; cursor:not-allowed;}
button:hover:not(:disabled){opacity:0.85;}
.warning{color:red; font-weight:bold; display:none; margin:10px 0;}

/* PDF pages download links */
.page-buttons{margin-top:20px; text-align:center;}
.page-buttons a{display:block; color:#00bfff; text-decoration:none; font-weight:bold; margin:6px 0;}
.page-buttons a:hover{text-decoration:underline;}

/* All PDF Tools Button */
.all-tools-btn{
  display:inline-block;
  margin:35px auto;
  padding:15px 30px;
  font-size:18px;
  font-weight:bold;
  color:#fff;
  background:#2563eb;
  text-decoration:none;
  border-radius:8px;
  transition:0.3s;
}
.all-tools-btn:hover{opacity:0.85;}

/* Bottom Home Button */
.home-btn{
  display:inline-block;
  margin:30px auto 0;
  padding:15px 30px;
  font-size:18px;
  font-weight:bold;
  color:#fff;
  background:#6b7280;
  text-decoration:none;
  border-radius:8px;
  transition:0.3s;
}
.home-btn:hover{opacity:0.85;}
.ad-placeholder{border:2px dashed #555; padding:20px; margin:25px 0; color:#aaa; font-size:14px; text-align:center; border-radius:0;}
</style>
</head>

<body>
<div class="container">
  <h1>PDF to Image Tool</h1>
  <p>Upload a PDF (Max 15 MB) to convert each page into PNG images. Each page will have a download button. Fast, secure, browser-based.</p>

  <!-- PDF to Image Tool -->
  <input type="file" id="pdfFile" accept="application/pdf"><br>
  <button id="convertBtn" disabled>Convert PDF to Images</button>
  <p class="warning" id="warn">⚠️ File must be under 15 MB</p>
  <div class="page-buttons" id="pageButtons"></div>

  <!-- All PDF Tools Button -->
  <a class="all-tools-btn" href="https://easyusehub.blogspot.com/p/free-pdf-tools-online.html=1" target="_blank">📚 All PDF Tools</a>

  <!-- Bottom Home Button -->
  <a class="home-btn" href="https://easyusehub.blogspot.com/?m=1">🏠 Home</a>

  <!-- Optional Ad Placeholder -->
  <div class="ad-placeholder">Ad Placeholder</div>
</div>

<script>
const fileInput=document.getElementById("pdfFile");
const convertBtn=document.getElementById("convertBtn");
const warn=document.getElementById("warn");
const pageButtons=document.getElementById("pageButtons");
const MAX=15*1024*1024;

fileInput.addEventListener("change",()=>{
  const f=fileInput.files[0];
  pageButtons.innerHTML="";
  if(!f){convertBtn.disabled=true;return;}
  if(f.size>MAX){
    warn.style.display="block";
    convertBtn.disabled=true;
    fileInput.value="";
  } else {
    warn.style.display="none";
    convertBtn.disabled=false;
  }
});

convertBtn.addEventListener("click", async ()=>{
  pageButtons.innerHTML="";
  const f=fileInput.files[0];
  if(!f) return;

  const fileReader = new FileReader();
  fileReader.onload = async function() {
    const typedarray = new Uint8Array(this.result);
    const loadingTask = pdfjsLib.getDocument(typedarray);
    const pdf = await loadingTask.promise;

    for(let i=1; i<=pdf.numPages; i++){
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale:2 });
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({canvasContext: context, viewport: viewport}).promise;
      
      canvas.toBlob(function(blob){
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `page-${i}.png`;
        link.textContent = `Download Page ${i}`;
        pageButtons.appendChild(link);
      }, "image/png");
    }
  };
  fileReader.readAsArrayBuffer(f);
});
</script>
</body>
</html>
